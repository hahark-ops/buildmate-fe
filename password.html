<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 보안 - 빌드메이트</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/password.css">
</head>

<body>
    <header>
        <a href="index.html" class="back-button">&lt;</a>
        <span class="logo">빌드메이트</span>
        <div class="header-content">
            <div class="header-actions">
                <a href="dm.html" class="header-icon-btn dm-icon-btn" aria-label="협업 채팅">협업 채팅</a>
                <div class="profile-icon" id="profileIcon"></div>
            </div>
            <!-- 드롭다운 메뉴 -->
            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html" class="dropdown-item">메이커 프로필</a>
                <a href="password.html" class="dropdown-item active">계정 보안</a>
                <a href="#" class="dropdown-item" id="logoutBtn">로그아웃</a>
            </div>
        </div>
    </header>

    <main class="password-container">
        <h1 class="page-title">계정 보안</h1>

        <form id="passwordForm" class="password-form">
            <input type="email" id="accountEmail" name="accountEmail" autocomplete="username" tabindex="-1" aria-hidden="true" style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none;">

            <!-- 현재 비밀번호 (API 요구사항) -->
            <div class="input-group">
                <label for="currentPassword">현재 비밀번호</label>
                <input type="password" id="currentPassword" name="currentPassword" placeholder="현재 비밀번호를 입력해주세요" autocomplete="current-password">
                <div id="currentPasswordHelper" class="helper-text"></div>
            </div>

            <!-- 새 비밀번호 -->
            <div class="input-group">
                <label for="newPassword">비밀번호</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="비밀번호를 입력해주세요" autocomplete="new-password">
                <div id="newPasswordHelper" class="helper-text"></div>
            </div>

            <!-- 새 비밀번호 확인 -->
            <div class="input-group">
                <label for="confirmPassword">비밀번호 확인</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="비밀번호를 한번 더 입력해주세요" autocomplete="new-password">
                <div id="confirmPasswordHelper" class="helper-text"></div>
            </div>

            <!-- 수정하기 버튼 -->
            <button type="button" id="submitBtn" class="submit-btn" disabled>비밀번호 변경</button>
        </form>
    </main>

    <!-- 토스트 메시지 -->
    <div class="toast" id="toast">저장 완료</div>

    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/password.js"></script>
</body>

</html>
