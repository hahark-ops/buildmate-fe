<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 상세 - 빌드메이트</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/post_detail.css">
</head>

<body>
    <header>
        <a href="index.html" class="back-button">&lt;</a>
        <span class="logo">빌드메이트</span>
        <div class="header-content">
            <div class="header-actions">
                <a href="dm.html" class="header-icon-btn dm-icon-btn" aria-label="협업 채팅">협업 채팅</a>
                <div class="profile-icon" id="profileIcon"></div>
            </div>
            <!-- 드롭다운 메뉴 -->
            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html" class="dropdown-item">메이커 프로필</a>
                <a href="password.html" class="dropdown-item">계정 보안</a>
                <a href="#" class="dropdown-item" id="logoutBtn">로그아웃</a>
            </div>
        </div>
    </header>

    <main class="post-detail-container">
        <!-- 게시글 본문 영역 -->
        <article class="post-article">
            <!-- 제목 -->
            <h1 class="post-title" id="postTitle"></h1>

            <!-- 작성자 정보 + 수정/삭제 버튼 -->
            <div class="post-meta-row">
                <div class="author-info">
                    <div class="author-avatar" id="authorAvatar"></div>
                    <span class="author-name" id="authorName"></span>
                    <span class="post-date" id="postDate"></span>
                </div>
                <!-- 수정/삭제 버튼 (본인일 때만 표시) -->
                <div class="post-actions" id="postActions" style="display: none;">
                    <button class="action-btn edit-btn" id="editPostBtn">수정</button>
                    <button class="action-btn delete-btn" id="deletePostBtn">삭제</button>
                </div>
            </div>

            <div class="post-divider"></div>

            <!-- 게시글 이미지 -->
            <div class="post-image-container" id="postImageContainer" style="display: none;">
                <img id="postImage" src="" alt="게시글 이미지">
            </div>

            <section class="post-key-facts" id="postKeyFacts" hidden></section>

            <!-- 본문 내용 -->
            <div class="post-content" id="postContent"></div>

            <!-- 통계 박스 (좋아요, 조회수, 댓글수) -->
            <div class="stats-box">
                <button class="stat-item like-btn" id="likeBtn" disabled>
                    <span class="stat-count" id="likeCount">0</span>
                    <span class="stat-label">관심 수</span>
                </button>
                <div class="stat-item">
                    <span class="stat-count" id="viewCount">0</span>
                    <span class="stat-label">조회</span>
                </div>
                <div class="stat-item">
                    <span class="stat-count" id="commentCount">0</span>
                    <span class="stat-label">질문</span>
                </div>
            </div>
        </article>

        <!-- 댓글 영역 -->
        <section class="comments-section">
            <!-- 댓글 입력 -->
            <div class="comment-input-area">
                <textarea id="commentInput" placeholder="프로젝트에 대해 공개로 확인하고 싶은 점을 남겨보세요."></textarea>
                <button type="button" id="commentSubmitBtn" class="comment-submit-btn" disabled>질문 남기기</button>
            </div>

            <!-- 댓글 목록 -->
            <div class="comment-list" id="commentList">
                <!-- 댓글 아이템들이 JS로 렌더링됨 -->
            </div>
        </section>
    </main>

    <!-- 삭제 확인 모달 -->
    <div class="modal-overlay" id="deleteModal" style="display: none;">
        <div class="modal-box">
            <p class="modal-title" id="modalTitle">모집글을 삭제하시겠습니까?</p>
            <p class="modal-subtitle" id="modalSubtitle">삭제한 모집 내용은 복구할 수 없습니다.</p>
            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" id="modalCancelBtn">취소</button>
                <button class="modal-btn confirm-btn" id="modalConfirmBtn">확인</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/post_detail.js"></script>
</body>

</html>
