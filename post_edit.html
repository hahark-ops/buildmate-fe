<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모집글 수정 - 빌드메이트</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/post_write.css">
</head>

<body>
    <header>
        <a href="javascript:history.back()" class="back-button">&lt;</a>
        <span class="logo">빌드메이트</span>
        <div class="header-content">
            <div class="header-actions">
                <a href="dm.html" class="header-icon-btn dm-icon-btn" aria-label="협업 채팅">협업 채팅</a>
                <div class="profile-icon" id="profileIcon"></div>
            </div>
            <!-- 드롭다운 메뉴 -->
            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html" class="dropdown-item">메이커 프로필</a>
                <a href="password.html" class="dropdown-item">계정 보안</a>
                <a href="#" class="dropdown-item" id="logoutBtn">로그아웃</a>
            </div>
        </div>
    </header>

    <main class="post-write-container">
        <h1 class="page-title">모집글 수정</h1>

        <form id="postEditForm" class="post-write-form">
            <!-- 제목 -->
            <div class="input-group">
                <label for="title">제목*</label>
                <input type="text" id="title" name="title" placeholder="예: AI 가계부 앱 같이 만들 메이트를 찾고 있습니다" maxlength="26">
            </div>

            <!-- 내용 -->
            <div class="input-group">
                <label for="content">프로젝트 소개*</label>
                <p class="content-helper">프로젝트 소개, 현재 진행 상태, 필요한 역할, 원하는 협업 방식을 적어주세요.</p>
                <textarea id="content" name="content" placeholder="프로젝트 소개:
현재 단계:
필요 역할:
사용 도구:
협업 방식:
합류 형태:"></textarea>
                <div class="content-guide">
                    <strong>이 정보는 꼭 적어주세요</strong>
                    <ul>
                        <li>프로젝트 소개:</li>
                        <li>현재 단계:</li>
                        <li>필요 역할:</li>
                        <li>사용 도구:</li>
                        <li>협업 방식:</li>
                        <li>합류 형태:</li>
                    </ul>
                </div>
            </div>

            <!-- 헬퍼 텍스트 -->
            <div id="helperText" class="helper-text"></div>

            <!-- 이미지 업로드 -->
            <div class="image-upload-group">
                <label>이미지</label>
                <div class="file-input-wrapper">
                    <button type="button" class="file-select-btn" id="fileSelectBtn">파일 선택</button>
                    <span class="file-name" id="fileName">기존 파일 명</span>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                </div>
            </div>

            <!-- 수정하기 버튼 -->
            <button type="button" id="submitBtn" class="submit-btn active">모집글 수정하기</button>
        </form>
    </main>

    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/post_edit.js"></script>
</body>

</html>
