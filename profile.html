<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이커 프로필 - 빌드메이트</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <header>
        <!-- Back button removed -->
        <span class="logo">빌드메이트</span>
        <div class="header-content">
            <div class="header-actions">
                <a href="dm.html" class="header-icon-btn dm-icon-btn" aria-label="협업 채팅">협업 채팅</a>
                <div class="profile-icon" id="profileIcon"></div>
            </div>
            <!-- 드롭다운 메뉴 -->
            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html" class="dropdown-item active">메이커 프로필</a>
                <a href="password.html" class="dropdown-item">계정 보안</a>
                <a href="#" class="dropdown-item" id="logoutBtn">로그아웃</a>
            </div>
        </div>
    </header>

    <main class="profile-container">
        <h1 class="page-title">메이커 프로필</h1>

        <form id="profileForm" class="profile-form">
            <!-- 프로필 사진 (원형 오버레이 디자인) -->
            <div class="input-group profile-upload-section">
                <label>프로필 사진*</label>
                <div class="profile-image-container" id="profileImageContainer">
                    <img id="profileImg" src="" alt="프로필 이미지">
                    <div class="profile-overlay">
                        <span class="overlay-text">변경</span>
                    </div>
                </div>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <div id="profileError" class="helper-text"></div>
            </div>

            <!-- 이메일 (읽기 전용) -->
            <div class="input-group">
                <label>이메일</label>
                <div class="email-display" id="emailDisplay">loading@email.com</div>
            </div>

            <!-- 닉네임 -->
            <div class="input-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" name="nickname" placeholder="닉네임을 입력하세요" maxlength="10" autocomplete="nickname">
                <div id="nicknameHelper" class="helper-text"></div>
            </div>

            <!-- 수정하기 버튼 -->
            <button type="button" id="submitBtn" class="submit-btn" style="background-color: #ACA0EB;">프로필 저장하기</button>

            <!-- 회원 탈퇴 -->
            <div class="withdraw-link">
                <a href="#" id="withdrawBtn">회원 탈퇴</a>
            </div>
        </form>

        <!-- 수정완료 버튼 (목록으로 이동) -->
        <button type="button" id="completeBtn" class="complete-btn">이전 화면으로 돌아가기</button>

    </main>

    <!-- 회원 탈퇴 확인 모달 -->
    <div class="modal-overlay" id="withdrawModal" style="display: none;">
        <div class="modal-box">
            <p class="modal-title">빌드메이트를 탈퇴하시겠습니까?</p>
            <p class="modal-subtitle">작성한 모집글, 댓글, 관심 표시, DM 기록은 영구 삭제됩니다.</p>
            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" id="modalCancelBtn">취소</button>
                <button class="modal-btn confirm-btn" id="modalConfirmBtn">확인</button>
            </div>
        </div>
    </div>

    <!-- 토스트 메시지 -->
    <div class="toast" id="toast">저장 완료</div>

    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
